{% extends "base.html" %}

{% block title %}Login — Palpitaria FC{% endblock %}

{% block content %}
<style>
    body {
        background: #0f172a; /* Fundo escuro para destacar a arte */
        overflow: hidden;
    }
    .sidebar { display: none !important; }
    .main-content { 
        padding: 0;
        margin: 0;
        max-width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    .login-bg {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: url('/static/assets/energy.png');
        background-size: cover;
        background-position: center;
        opacity: 0.15; /* Mancha d'água */
        z-index: 1;
    }
    .login-container {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 400px;
        padding: 1rem;
    }
</style>

<div class="login-bg"></div>

<div class="login-container">
    <div class="card" style="padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);">
        <header style="text-align: center; margin-bottom: 2rem;">
            <img src="/static/assets/logo.png" alt="Palpitaria FC" style="height: 60px; margin-bottom: 1rem;">
            <h2>Acesso Restrito</h2>
            <p class="sub">Entre com suas credenciais para gerenciar suas filiais</p>
        </header>

        {% if error %}
        <div class="alert" style="margin-bottom: 1.5rem; background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">E-mail</label>
                <input type="email" name="email" required placeholder="seu@email.com" 
                       style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem;">Senha</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem;">
            </div>

            <label style="display: flex; gap: 0.6rem; align-items: flex-start; margin-bottom: 1.25rem; font-size: 0.78rem; color: var(--muted); line-height: 1.45; cursor: pointer;">
                <input type="checkbox" name="accept_terms" value="on" required style="margin-top: 0.2rem; flex-shrink: 0;">
                <span>
                    Li o <a href="/legal/aviso-legal" target="_blank" rel="noopener" style="color: var(--blue); font-weight: 700;">Aviso Legal</a>,
                    declaro ser <strong>maior de 18 anos</strong> e entendo que o Palpitaria FC oferece
                    <strong>palpites opinativos</strong> — não somos casa de apostas e sou o único responsável pelas minhas entradas.
                </span>
            </label>

            <button type="submit" class="secondary" style="width: 100%; padding: 0.85rem; font-weight: 600;">
                Entrar no Sistema
            </button>
        </form>

        <footer style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--muted);">
            <p style="margin: 0;">Sempre com <strong>SEGURANÇA</strong> e <strong>SOBRIEDADE</strong>.</p>
        </footer>
    </div>
</div>
{% endblock %}
